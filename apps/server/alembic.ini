# Alembic configuration. The database URL is resolved at runtime in
# db/migrations/env.py (from the TOKEMETRY_DATABASE_URL setting), so it is
# intentionally left blank here.
[alembic]
script_location = %(here)s/src/tokemetry_server/db/migrations
prepend_sys_path = src
path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
