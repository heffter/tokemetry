# tokemetry-core: shared domain models, provider abstractions, and pricing logic.
[project]
name = "tokemetry-core"
version = "0.1.0"
description = "Shared models and provider abstractions for tokemetry"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tokemetry_core"]
